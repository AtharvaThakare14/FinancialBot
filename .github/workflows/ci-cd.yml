name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black mypy

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          black --check .

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports || true

      - name: Test imports
        run: |
          python -c "from app.config import settings; print('Config OK')"
          python -c "from rag.embeddings import EmbeddingModel; print('Embeddings OK')"
          python -c "from rag.vector_store import FAISSVectorStore; print('Vector Store OK')"
          python -c "from rag.retriever import LoanRetriever; print('Retriever OK')"
          python -c "from rag.qa_chain import LoanQAChain; print('QA Chain OK')"

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify build
        run: |
          python -c "import main; print('Main module OK')"
          python -c "from app.config import settings; print(f'API Title: {settings.API_TITLE}')"

      - name: Build summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 All dependencies installed"
          echo "🔍 Code quality checks passed"

